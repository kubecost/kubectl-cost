name: Build release binaries for tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/setup-go@v4
        with:
          go-version: ^1.22

      - name: Install govvv
        run: |
          go install github.com/ahmetb/govvv@latest

      - uses: actions/checkout@v4

      - name: Make release
        run: |
          make release

      - name: Checkout github-actions
        uses: actions/checkout@v4
        with:
          repository: kubecost/github-actions
          path: github-actions
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Release
        uses: ./github-actions/action-gh-release
        with:
          files: 'cmd/kubectl-cost/kubectl-cost-*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in Krew index
        uses: rajatjindal/krew-release-bot@v0.0.47
        # see https://github.com/rajatjindal/krew-release-bot
        # and /.krew.yaml

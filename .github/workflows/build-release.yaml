name: Build release binaries for tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/setup-go@v6
        with:
          go-version: ^1.22

      - name: Install govvv
        run: |
          go install github.com/ahmetb/govvv@latest

      - uses: actions/checkout@v6

      - name: Make release
        run: |
          make release

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" cmd/kubectl-cost/kubectl-cost-*

      - name: Checkout krew-release-bot
        uses: actions/checkout@v6
        with:
          repository: kubecost/krew-release-bot
          path: krew-release-bot
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Update version in Krew index
        uses: ./krew-release-bot
        with:
          token: ${{ secrets.ACTIONS_PAT }}
